name: フロントエンド
description: フロントエンド(Next.js/React)に関するissue
title: "[Frontend] "
labels: ["Frontend"]
body:
  - type: markdown
    attributes:
      value: |
        フロントエンドに関するissueを報告してください。
      
  - type: textarea
    id: description
    attributes:
      label: 詳細
      description: issueの詳細を記載してください
      placeholder: |
        何が起きているのか、何を実装したいのかを具体的に記述してください。
    validations:
      required: false
      
  - type: textarea
    id: completion_criteria
    attributes:
      label: 完了条件
      description: このissueが完了したと判断する条件を記載してください
    validations:
      required: false
  
  - type: textarea
    id: estimation
    attributes:
      label: 見積もり      
      description: このissueの見積もりを記載してください
    validations:
      required: false
