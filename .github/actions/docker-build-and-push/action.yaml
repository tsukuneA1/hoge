name: "docker-build-and-push"
description: "Build and push docker images"
inputs:
  build-context:
    description: "Docker build context path."
    default: ""
    required: false
  dockerfile-dir:
    description: "The directory of Dockerfile"
    required: true
  dockerfile-name:
    description: "The name of Dockerfile"
    required: true
  container-name:
    description: "Container name for docker tags"
    required: true
  workload-identity-provider:
    description: "Workload Identity Provider for Google Cloud"
    required: false
  service-account-email:
    description: "Service Account Email for Google Cloud"
    required: false
  additional-build-args:
    description: "Additional build args for build and push"
    default: ""
    required: false
  build-only-option:
    description: "Option to build only, not push to any registries"
    default: "false"
    required: false
runs:
  using: "composite"
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Authenticate to Google Cloud
      id: auth-google-cloud
      uses: google-github-actions/auth@v2
      with:
        token_format: access_token
        project_id: "waseda-syllabus-project"
        workload_identity_provider: ${{ inputs.workload-identity-provider }}
        service_account: ${{ inputs.service-account-email }}

    - name: Login to Artifact Registry
      uses: docker/login-action@v3
      with:
        registry: asia-northeast1-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth-google-cloud.outputs.access_token }}


    - name: Extract server metadata (tags, labels) for Docker
      id: metadata
      uses: docker/metadata-action@v5
      with:
        images: |
          asia-northeast1-docker.pkg.dev/waseda-syllabus-project/syllabus/${{ inputs.container-name }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=match,pattern=${{ inputs.container-name }}/(v\d+.\d+.\d+(?:-[\w-]+)?),group=1
          type=sha
        flavor: |
          latest=true

    - name: Get version
      id: version
      shell: bash
      run: |
        VERSION="$(git describe --tags --dirty --match "${{ inputs.container-name }}/v*" 2>/dev/null | sed 's/.*\///')"

        if [ -z "$VERSION" ]; then
          VERSION="unknown-g$(git rev-parse --short=7 HEAD)"
        fi

        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        echo "Version: ${VERSION}"


    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.build-context }}
        file: ${{ inputs.dockerfile-dir }}/${{ inputs.dockerfile-name }}
        provenance: false
        push: ${{ inputs.build-only-option != 'true' }}
        tags: ${{ steps.metadata.outputs.tags }}
        labels: ${{ steps.metadata.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args:
          VERSION=${{ steps.version.outputs.version }}
          SERVICE_NAME=waseda-syllabus-project
          ${{ inputs.additional-build-args }}

